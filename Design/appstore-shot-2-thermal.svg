<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12161C"/>
      <stop offset="0.58" stop-color="#1B2328"/>
      <stop offset="1" stop-color="#2D261F"/>
    </linearGradient>
    <linearGradient id="heatGlow" x1="1080" y1="220" x2="1480" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4C44C" stop-opacity="0.55"/>
      <stop offset="0.65" stop-color="#F28C38" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FF5A5F" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="shadow2" x="0" y="0" width="1600" height="1200" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="36" stdDeviation="38" flood-color="#04070C" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg2)"/>
  <circle cx="1260" cy="250" r="300" fill="url(#heatGlow)"/>
  <circle cx="230" cy="1010" r="280" fill="#34C759" fill-opacity="0.10"/>

  <text x="116" y="180" fill="#F5F7FB" font-family="SF Pro Display, PingFang SC, sans-serif" font-size="78" font-weight="760" letter-spacing="-2.2">
    快速识别热量变化
  </text>
  <text x="118" y="250" fill="rgba(245,247,251,0.68)" font-family="SF Pro Text, PingFang SC, sans-serif" font-size="28" font-weight="500">
    用更清晰的状态词和颜色梯度，迅速判断 Mac 当前的热状态。
  </text>

  <g filter="url(#shadow2)">
    <rect x="120" y="320" width="1360" height="760" rx="42" fill="#252A31" stroke="rgba(255,255,255,0.09)"/>
    <rect x="120" y="320" width="1360" height="42" rx="42" fill="#2C333D"/>
    <circle cx="160" cy="341" r="8" fill="#FF5F57"/>
    <circle cx="184" cy="341" r="8" fill="#FEBC2E"/>
    <circle cx="208" cy="341" r="8" fill="#28C840"/>

    <text x="210" y="430" fill="#F4F6F8" font-family="SF Pro Display, sans-serif" font-size="36" font-weight="760">Thermal State</text>

    <g>
      <rect x="210" y="500" width="280" height="430" rx="28" fill="#1F2022"/>
      <text x="350" y="570" text-anchor="middle" fill="#34C759" font-family="SF Pro Rounded, sans-serif" font-size="58" font-weight="700">Chill</text>
      <text x="350" y="845" text-anchor="middle" fill="rgba(255,255,255,0.50)" font-family="SF Pro Text, sans-serif" font-size="22" font-weight="600">All good and easy</text>
    </g>

    <g>
      <rect x="520" y="500" width="280" height="430" rx="28" fill="#1F2022"/>
      <text x="660" y="570" text-anchor="middle" fill="#F5C451" font-family="SF Pro Rounded, sans-serif" font-size="58" font-weight="700">Warming up</text>
      <text x="660" y="845" text-anchor="middle" fill="rgba(255,255,255,0.50)" font-family="SF Pro Text, sans-serif" font-size="22" font-weight="600">Starting to feel warm</text>
    </g>

    <g>
      <rect x="830" y="500" width="280" height="430" rx="28" fill="#1F2022"/>
      <text x="970" y="570" text-anchor="middle" fill="#F28C38" font-family="SF Pro Rounded, sans-serif" font-size="58" font-weight="700">Hot and busy</text>
      <text x="970" y="845" text-anchor="middle" fill="rgba(255,255,255,0.50)" font-family="SF Pro Text, sans-serif" font-size="22" font-weight="600">Heat is building up</text>
    </g>

    <g>
      <rect x="1140" y="500" width="280" height="430" rx="28" fill="#1F2022"/>
      <text x="1280" y="570" text-anchor="middle" fill="#FF5A5F" font-family="SF Pro Rounded, sans-serif" font-size="58" font-weight="700">Overheating</text>
      <text x="1280" y="845" text-anchor="middle" fill="rgba(255,255,255,0.50)" font-family="SF Pro Text, sans-serif" font-size="22" font-weight="600">Needs a cooldown</text>
    </g>
  </g>
</svg>
