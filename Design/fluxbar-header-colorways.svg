<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF3F8"/>
      <stop offset="1" stop-color="#E3EAF2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 46px -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; letter-spacing: 0.2px; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; letter-spacing: 0.4px; }
      .meta { font: 500 17px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
      .small { font: 600 15px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; letter-spacing: 0.2px; }
      .swatch { rx: 10; ry: 10; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="96" y="110" fill="#122033" class="title">FluxBar 标题配色示意</text>
  <text x="96" y="154" fill="#5F6C7B" class="subtitle">对比当前拼色和 3 套更稳的标题方案，只看品牌标题区，不改你现有信息布局。</text>

  <g filter="url(#shadow)">
    <rect x="80" y="220" width="680" height="300" rx="28" fill="#F6F9FC"/>
    <rect x="80" y="220" width="680" height="72" rx="28" fill="#EAF1F7"/>
    <rect x="80" y="264" width="680" height="28" fill="#EAF1F7"/>
    <circle cx="126" cy="256" r="8" fill="#FF6257"/>
    <circle cx="152" cy="256" r="8" fill="#FFBE2E"/>
    <circle cx="178" cy="256" r="8" fill="#28C840"/>
    <text x="96" y="330" fill="#2C3948" class="label">当前拼色</text>
    <text x="96" y="368" fill="#7A8696" class="meta">问题：冷青 + 暖橙跳得太开，品牌气质不够统一。</text>
    <text x="96" y="435" fill="#22B5D7" class="title">Flux</text>
    <text x="244" y="435" fill="#F28C28" class="title">Bar</text>
    <text x="96" y="484" fill="#6B7280" class="meta">A lightweight monitor for load, heat, and activity.</text>
    <rect x="96" y="408" width="54" height="8" rx="4" fill="#22B5D7" opacity="0.22"/>
    <rect x="240" y="408" width="44" height="8" rx="4" fill="#F28C28" opacity="0.26"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="220" width="680" height="300" rx="28" fill="#F7F9FB"/>
    <rect x="840" y="220" width="680" height="72" rx="28" fill="#EEF3F8"/>
    <rect x="840" y="264" width="680" height="28" fill="#EEF3F8"/>
    <circle cx="886" cy="256" r="8" fill="#FF6257"/>
    <circle cx="912" cy="256" r="8" fill="#FFBE2E"/>
    <circle cx="938" cy="256" r="8" fill="#28C840"/>
    <text x="856" y="330" fill="#2C3948" class="label">方案 A · Slate Blue</text>
    <text x="856" y="368" fill="#7A8696" class="meta">专业、克制，最像成熟的 macOS 系统工具。</text>
    <text x="856" y="435" fill="#2B3440" class="title">Flux</text>
    <text x="1004" y="435" fill="#4C8DFF" class="title">Bar</text>
    <text x="856" y="484" fill="#6B7280" class="meta">A lightweight monitor for load, heat, and activity.</text>
    <rect x="856" y="408" width="54" height="8" rx="4" fill="#2B3440" opacity="0.18"/>
    <rect x="1000" y="408" width="44" height="8" rx="4" fill="#4C8DFF" opacity="0.24"/>
    <rect x="1242" y="328" width="30" height="30" class="swatch" fill="#2B3440"/>
    <rect x="1282" y="328" width="30" height="30" class="swatch" fill="#4C8DFF"/>
    <rect x="1322" y="328" width="30" height="30" class="swatch" fill="#6B7280"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="580" width="680" height="300" rx="28" fill="#FCF8F6"/>
    <rect x="80" y="580" width="680" height="72" rx="28" fill="#F7EFEB"/>
    <rect x="80" y="624" width="680" height="28" fill="#F7EFEB"/>
    <circle cx="126" cy="616" r="8" fill="#FF6257"/>
    <circle cx="152" cy="616" r="8" fill="#FFBE2E"/>
    <circle cx="178" cy="616" r="8" fill="#28C840"/>
    <text x="96" y="690" fill="#433A37" class="label">方案 B · Thermal Warm</text>
    <text x="96" y="728" fill="#8A7F7A" class="meta">更贴近热量监控语义，但依旧克制，不会像告警色。</text>
    <text x="96" y="795" fill="#3C312D" class="title">Flux</text>
    <text x="244" y="795" fill="#E06A3E" class="title">Bar</text>
    <text x="96" y="844" fill="#8A7F7A" class="meta">A lightweight monitor for load, heat, and activity.</text>
    <rect x="96" y="768" width="54" height="8" rx="4" fill="#3C312D" opacity="0.18"/>
    <rect x="240" y="768" width="44" height="8" rx="4" fill="#E06A3E" opacity="0.22"/>
    <rect x="482" y="688" width="30" height="30" class="swatch" fill="#3C312D"/>
    <rect x="522" y="688" width="30" height="30" class="swatch" fill="#E06A3E"/>
    <rect x="562" y="688" width="30" height="30" class="swatch" fill="#8A7F7A"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="580" width="680" height="300" rx="28" fill="#F8F9FC"/>
    <rect x="840" y="580" width="680" height="72" rx="28" fill="#EEF1F8"/>
    <rect x="840" y="624" width="680" height="28" fill="#EEF1F8"/>
    <circle cx="886" cy="616" r="8" fill="#FF6257"/>
    <circle cx="912" cy="616" r="8" fill="#FFBE2E"/>
    <circle cx="938" cy="616" r="8" fill="#28C840"/>
    <text x="856" y="690" fill="#283140" class="label">方案 C · Native Graphite</text>
    <text x="856" y="728" fill="#7C8696" class="meta">苹果系中性色，更像原生增强工具，品牌感更低调。</text>
    <text x="856" y="795" fill="#1F2937" class="title">Flux</text>
    <text x="1004" y="795" fill="#5E6AD2" class="title">Bar</text>
    <text x="856" y="844" fill="#6B7280" class="meta">A lightweight monitor for load, heat, and activity.</text>
    <rect x="856" y="768" width="54" height="8" rx="4" fill="#1F2937" opacity="0.18"/>
    <rect x="1000" y="768" width="44" height="8" rx="4" fill="#5E6AD2" opacity="0.22"/>
    <rect x="1242" y="688" width="30" height="30" class="swatch" fill="#1F2937"/>
    <rect x="1282" y="688" width="30" height="30" class="swatch" fill="#5E6AD2"/>
    <rect x="1322" y="688" width="30" height="30" class="swatch" fill="#6B7280"/>
  </g>
</svg>
