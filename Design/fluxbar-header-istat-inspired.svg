<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDF4FB"/>
      <stop offset="1" stop-color="#E5EEF8"/>
    </linearGradient>
    <linearGradient id="hero" x1="280" y1="120" x2="1310" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#53D4F8"/>
      <stop offset="0.52" stop-color="#558CFF"/>
      <stop offset="1" stop-color="#5D58E8"/>
    </linearGradient>
    <linearGradient id="chartBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#57C8FF"/>
      <stop offset="1" stop-color="#2F80FF"/>
    </linearGradient>
    <linearGradient id="chartPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF73B8"/>
      <stop offset="1" stop-color="#FF4FA3"/>
    </linearGradient>
    <linearGradient id="chartOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB36B"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#253245" flood-opacity="0.14"/>
    </filter>
    <style>
      .eyebrow { font: 700 18px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; letter-spacing: 1.4px; text-transform: uppercase; }
      .heroTitle { font: 700 64px -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; letter-spacing: 0.2px; }
      .heroBody { font: 500 24px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
      .cardTitle { font: 700 18px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
      .cardValue { font: 700 24px -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; }
      .cardMeta { font: 600 14px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
      .noteTitle { font: 700 30px -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; }
      .noteBody { font: 500 20px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
      .chip { font: 700 16px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#pageBg)"/>

  <rect x="70" y="70" width="1460" height="840" rx="44" fill="url(#hero)"/>
  <circle cx="1320" cy="170" r="190" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="240" cy="760" r="210" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="1440" cy="770" r="120" fill="#FFFFFF" opacity="0.05"/>

  <text x="150" y="175" fill="#EAF6FF" class="eyebrow">MENUBAR SYSTEM MONITOR</text>
  <text x="150" y="270" fill="#FFFFFF" class="heroTitle">FluxBar</text>
  <text x="150" y="322" fill="#E5F3FF" class="heroBody">统一品牌字，不再做标题拼色。色彩表达放到冷色渐变氛围和模块数据上。</text>

  <g filter="url(#panelShadow)">
    <rect x="120" y="390" width="1360" height="420" rx="34" fill="#F6F8FB"/>
    <rect x="120" y="390" width="1360" height="86" rx="34" fill="#EEF4FA"/>
    <rect x="120" y="442" width="1360" height="34" fill="#EEF4FA"/>

    <circle cx="170" cy="433" r="8" fill="#FF6257"/>
    <circle cx="196" cy="433" r="8" fill="#FFBE2E"/>
    <circle cx="222" cy="433" r="8" fill="#28C840"/>

    <text x="150" y="545" fill="#243244" class="noteTitle">Header Direction</text>
    <text x="150" y="590" fill="#7B8BA0" class="noteBody">标题统一用深石墨或纯白，不再拆成两种品牌色。CPU / MEM / 温度 / 网络的颜色只服务功能模块，不占用品牌标题。</text>

    <rect x="150" y="628" width="140" height="40" rx="20" fill="#E7EFF7"/>
    <text x="182" y="654" fill="#4D6178" class="chip">Brand First</text>

    <rect x="312" y="628" width="152" height="40" rx="20" fill="#E7EFF7"/>
    <text x="342" y="654" fill="#4D6178" class="chip">Data Color Second</text>

    <g transform="translate(820 520)">
      <rect x="0" y="0" width="560" height="220" rx="28" fill="#FFFFFF"/>
      <rect x="0" y="0" width="560" height="1" fill="#FFFFFF" opacity="0.75"/>
      <rect x="30" y="32" width="500" height="156" rx="22" fill="#F7FAFD" stroke="#DFE8F2"/>

      <text x="54" y="72" fill="#243244" class="cardTitle">FluxBar</text>
      <text x="54" y="102" fill="#8A98AB" class="cardMeta">A lightweight monitor for load, heat, and activity.</text>

      <rect x="54" y="128" width="96" height="8" rx="4" fill="url(#chartBlue)"/>
      <rect x="164" y="128" width="82" height="8" rx="4" fill="url(#chartPink)"/>
      <rect x="260" y="128" width="74" height="8" rx="4" fill="url(#chartOrange)"/>

      <g transform="translate(54 148)">
        <rect x="0" y="0" width="126" height="64" rx="18" fill="#F4F8FC" stroke="#E1E8F1"/>
        <text x="18" y="24" fill="#6E8198" class="cardMeta">CPU</text>
        <text x="18" y="50" fill="#243244" class="cardValue">42%</text>
        <rect x="84" y="18" width="18" height="28" rx="9" fill="url(#chartBlue)"/>
      </g>

      <g transform="translate(196 148)">
        <rect x="0" y="0" width="126" height="64" rx="18" fill="#F4F8FC" stroke="#E1E8F1"/>
        <text x="18" y="24" fill="#6E8198" class="cardMeta">MEM</text>
        <text x="18" y="50" fill="#243244" class="cardValue">61%</text>
        <rect x="84" y="18" width="18" height="28" rx="9" fill="url(#chartPink)"/>
      </g>

      <g transform="translate(338 148)">
        <rect x="0" y="0" width="168" height="64" rx="18" fill="#F4F8FC" stroke="#E1E8F1"/>
        <text x="18" y="24" fill="#6E8198" class="cardMeta">TEMP</text>
        <text x="18" y="50" fill="#243244" class="cardValue">53°</text>
        <rect x="114" y="18" width="32" height="10" rx="5" fill="url(#chartOrange)"/>
        <rect x="114" y="34" width="22" height="10" rx="5" fill="#D9E3EF"/>
      </g>
    </g>
  </g>

  <text x="120" y="868" fill="#EFF7FF" class="noteBody">推荐方向：标题用单色，背景用冷色渐变，功能色分配给数据模块。整体更接近 iStat Menus 的产品气质。</text>
</svg>
