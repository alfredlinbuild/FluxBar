<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluxBar App Store Shots Preview</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      background: #10141a;
      color: #eef2f6;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0 0 22px;
      color: rgba(238,242,246,0.68);
      font-size: 15px;
      line-height: 1.5;
      max-width: 840px;
    }
    .stack {
      display: grid;
      gap: 22px;
    }
    .shot {
      background: #161c24;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
    }
    .label {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
      color: rgba(238,242,246,0.82);
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>FluxBar App Store Screenshot Drafts</h1>
  <p>Three screenshot directions for Mac App Store listing: overview value, thermal clarity, and trends with quick controls. These are vector drafts and can be exported to the final store sizes you need.</p>
  <div class="stack">
    <section class="shot">
      <div class="label">01 · 一眼掌握 Mac 状态</div>
      <img src="./appstore-shot-1-overview.svg" alt="Shot 1">
    </section>
    <section class="shot">
      <div class="label">02 · 快速识别热量变化</div>
      <img src="./appstore-shot-2-thermal.svg" alt="Shot 2">
    </section>
    <section class="shot">
      <div class="label">03 · 趋势和操作同屏可见</div>
      <img src="./appstore-shot-3-trends.svg" alt="Shot 3">
    </section>
  </div>
</body>
</html>
