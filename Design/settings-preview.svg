    <rect x="406" y="472" width="50" height="30" rx="15" fill="#1E87FF"/>
    <rect x="429" y="475" width="24" height="24" rx="12" fill="white"/>

    <line x1="128" y1="528.5" x2="456" y2="528.5" stroke="rgba(60,74,91,0.09)"/>

