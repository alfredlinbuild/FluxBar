  <g font-family="SF Pro Display, Helvetica Neue, Arial">
    <text x="128" y="262" font-size="16" font-weight="650" fill="#2E3947">Mode</text>
    <text x="128" y="281" font-size="12" fill="#6F7D8F">Choose how compact FluxBar should stay in the menu bar.</text>
