<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1340" y2="930" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCE8F6"/>
      <stop offset="0.52" stop-color="#EDF4FB"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="menubar" x1="824" y1="196" x2="824" y2="248" gradientUnits="userSpaceOnUse">
