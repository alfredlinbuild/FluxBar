    <line x1="128" y1="300.5" x2="456" y2="300.5" stroke="rgba(60,74,91,0.09)"/>

    <text x="128" y="338" font-size="16" font-weight="650" fill="#2E3947">Show temperature</text>
    <text x="128" y="357" font-size="12" fill="#6F7D8F">Adds the thermometer icon and live temperature readout.</text>
    <rect x="406" y="320" width="50" height="30" rx="15" fill="#1E87FF"/>
    <rect x="429" y="323" width="24" height="24" rx="12" fill="white"/>

