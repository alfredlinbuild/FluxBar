<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDF4FB"/>
      <stop offset="1" stop-color="#DDE8F5"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#F4F8FC"/>
    </linearGradient>
    <linearGradient id="accentA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#50D4F7"/>
      <stop offset="1" stop-color="#4C77FF"/>
    </linearGradient>
    <linearGradient id="accentB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7E8BFF"/>
      <stop offset="1" stop-color="#4B5DE8"/>
    </linearGradient>
    <linearGradient id="accentC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ED0EE"/>
      <stop offset="1" stop-color="#5565F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1B2C41" flood-opacity="0.12"/>
    </filter>
    <style>
      .kicker { font: 700 18px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; letter-spacing: 1.6px; }
      .title { font: 700 54px -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; }
      .body { font: 500 19px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
      .label { font: 700 22px -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; }
      .meta { font: 600 16px -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif; }
      .markA1 { font: 700 86px -apple-system, BlinkMacSystemFont, "Avenir Next", "SF Pro Display", sans-serif; letter-spacing: -4px; }
      .markA2 { font: 900 86px -apple-system, BlinkMacSystemFont, "Avenir Next", "SF Pro Display", sans-serif; letter-spacing: -4px; }
      .markB1 { font: 500 86px -apple-system, BlinkMacSystemFont, "Avenir Next", "SF Pro Display", sans-serif; letter-spacing: -4.2px; }
      .markB2 { font: 900 86px -apple-system, BlinkMacSystemFont, "Avenir Next", "SF Pro Display", sans-serif; letter-spacing: -4.4px; }
      .markC1 { font: 800 84px -apple-system, BlinkMacSystemFont, "Avenir Next", "SF Pro Display", sans-serif; letter-spacing: -4px; }
      .markC2 { font: 700 84px -apple-system, BlinkMacSystemFont, "Avenir Next", "SF Pro Display", sans-serif; letter-spacing: -4px; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)"/>

  <text x="92" y="108" fill="#17304B" class="title">FluxBar 字标概念</text>
  <text x="92" y="148" fill="#64768A" class="body">这次不再是“标题排版”，而是更像品牌字标。重点看骨架、重心、字距和局部识别特征。</text>

  <g filter="url(#shadow)">
    <rect x="80" y="210" width="1440" height="250" rx="34" fill="url(#cardTop)"/>
    <text x="120" y="268" fill="#2A4058" class="label">A · Geometric Tech</text>
    <text x="120" y="302" fill="#75869A" class="body">全小写，科技感最强。靠紧字距、粗细反差和局部切口建立识别。</text>

    <text x="120" y="384" fill="#203246" class="markA1">flux</text>
    <text x="348" y="384" fill="#203246" class="markA2">bar</text>

    <rect x="129" y="392" width="314" height="6" rx="3" fill="url(#accentA)" opacity="0.9"/>
    <rect x="286" y="320" width="44" height="44" rx="14" fill="url(#accentA)" opacity="0.14"/>
    <path d="M296 332L320 356" stroke="#4B86FF" stroke-width="6" stroke-linecap="round"/>
    <path d="M320 332L296 356" stroke="#4B86FF" stroke-width="6" stroke-linecap="round"/>

    <text x="120" y="430" fill="#55687B" class="meta">关键词：lowercase / geometric / compressed / heavier “bar”</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="500" width="1440" height="250" rx="34" fill="url(#cardTop)"/>
    <text x="120" y="558" fill="#2A4058" class="label">B · Editorial Utility</text>
    <text x="120" y="592" fill="#75869A" class="body">更高级、更像成熟软件品牌。保留大小写，但做明显的字重节奏和排版张力。</text>

    <text x="120" y="674" fill="#1E2E40" class="markB1">Flux</text>
    <text x="343" y="674" fill="#1E2E40" class="markB2">Bar</text>

    <rect x="122" y="694" width="286" height="2" rx="1" fill="#8D9AB0"/>
    <rect x="420" y="628" width="58" height="58" rx="18" fill="url(#accentB)" opacity="0.12"/>
    <path d="M435 648H463" stroke="#5667EC" stroke-width="7" stroke-linecap="round"/>
    <path d="M449 634V662" stroke="#5667EC" stroke-width="7" stroke-linecap="round"/>

    <text x="120" y="720" fill="#55687B" class="meta">关键词：editorial / premium utility / semilight + black contrast</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="790" width="1440" height="220" rx="34" fill="url(#cardTop)"/>
    <text x="120" y="848" fill="#2A4058" class="label">C · Soft Futuristic</text>
    <text x="120" y="882" fill="#75869A" class="body">圆润但不幼稚。适合想保留一点亲和感，又不想太像默认系统字体的方向。</text>

    <text x="120" y="956" fill="#213449" class="markC1">flux</text>
    <text x="344" y="956" fill="#213449" class="markC2">bar</text>

    <path d="M126 968H420" stroke="url(#accentC)" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
    <circle cx="397" cy="837" r="26" fill="url(#accentC)" opacity="0.12"/>
    <path d="M384 837H410" stroke="#4D6FF4" stroke-width="6" stroke-linecap="round"/>
    <path d="M397 824V850" stroke="#4D6FF4" stroke-width="6" stroke-linecap="round"/>

    <text x="120" y="992" fill="#55687B" class="meta">关键词：rounded geometry / friendlier / modern desktop utility</text>
  </g>
</svg>
